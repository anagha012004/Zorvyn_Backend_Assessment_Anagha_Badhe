spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/financedb}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      url: ${SPRING_DATA_REDIS_URL:redis://localhost:6379}
      ssl:
        enabled: ${SPRING_DATA_REDIS_SSL:false}

server:
  port: ${PORT:8080}

jwt:
  secret: ${JWT_SECRET}
  access-token-expiry: 900000
  refresh-token-expiry: 604800000
  refresh-token-pepper: ${JWT_REFRESH_TOKEN_PEPPER}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

alerts:
  email:
    from: ${ALERT_EMAIL_FROM:noreply@zorvyn.finance}
    high-value-threshold: ${ALERT_HIGH_VALUE_THRESHOLD:10000}

resend:
  api-key: ${RESEND_API_KEY:}

# Merchant classifier: 'dictionary' (default, no external deps) or 'http' (external API)
merchant:
  classifier: ${MERCHANT_CLASSIFIER:dictionary}
