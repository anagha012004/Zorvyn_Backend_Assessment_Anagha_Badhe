services:
  # ── Backend ──────────────────────────────────────────────
  - type: web
    name: zorvyn-backend
    runtime: docker
    region: singapore
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: SPRING_DATASOURCE_URL
        fromDatabase:
          name: zorvyn-postgres
          property: connectionString
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: zorvyn-postgres
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: zorvyn-postgres
          property: password
      - key: SPRING_DATA_REDIS_URL
        sync: false          # set manually from Upstash (rediss://...)
      - key: SPRING_DATA_REDIS_SSL
        value: "true"
      - key: JWT_SECRET
        sync: false          # set manually: any random string >= 32 chars (e.g. openssl rand -base64 32)
      - key: FRONTEND_URL
        sync: false          # set after frontend is deployed

  # ── Frontend ─────────────────────────────────────────────
  - type: web
    name: zorvyn-frontend
    runtime: docker
    rootDir: frontend
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: VITE_API_URL
        sync: false          # set to https://zorvyn-backend.onrender.com after backend deploys

# ── PostgreSQL ────────────────────────────────────────────
databases:
  - name: zorvyn-postgres
    plan: free
    databaseName: financedb
