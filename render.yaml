services:
  # ── Backend ──────────────────────────────────────────────
  - type: web
    name: zorvyn-backend
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: SPRING_DATASOURCE_URL
        fromDatabase:
          name: zorvyn-postgres
          property: connectionString
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: zorvyn-postgres
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: zorvyn-postgres
          property: password
      - key: SPRING_DATA_REDIS_URL
        sync: false          # set manually from Upstash (rediss://...)
      - key: SPRING_DATA_REDIS_SSL
        value: "true"
      - key: JWT_SECRET
        sync: false          # set manually: openssl rand -base64 32
      - key: JWT_REFRESH_TOKEN_PEPPER
        sync: false          # set manually: openssl rand -base64 32
      - key: FRONTEND_URL
        sync: false          # set after frontend is deployed
      # ── Mail / Email Alerts (optional) ───────────────────
      - key: MAIL_HOST
        value: smtp.gmail.com
      - key: MAIL_PORT
        value: "587"
      - key: MAIL_USERNAME
        sync: false          # your Gmail address (or SES SMTP user)
      - key: MAIL_PASSWORD
        sync: false          # Gmail app password or SES SMTP password
      - key: ALERT_EMAIL_FROM
        sync: false          # e.g. noreply@yourdomain.com
      - key: ALERT_HIGH_VALUE_THRESHOLD
        value: "10000"       # alert threshold in INR

  # ── Frontend ─────────────────────────────────────────────
  - type: web
    name: zorvyn-frontend
    runtime: docker
    rootDir: frontend
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: VITE_API_URL
        sync: false          # set to https://zorvyn-backend.onrender.com after backend deploys

# ── PostgreSQL ────────────────────────────────────────────
databases:
  - name: zorvyn-postgres
    plan: free
    databaseName: financedb
